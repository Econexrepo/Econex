services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: econex-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: econex-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: econex-network
