name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add VM host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.21.192.28 >> ~/.ssh/known_hosts

      - name: Copy private key for SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy deploy script to VM
        env:
          SSH_KEY: /tmp/deploy_key
        run: |
          scp -i "$SSH_KEY" deploy.sh teran8777@34.21.192.28:/home/teran8777/deploy.sh

      - name: Run deploy script on VM with secrets
        env:
          SSH_KEY: /tmp/deploy_key
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WAREHOUSE_DATABASE_URL: ${{ secrets.WAREHOUSE_DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          ssh -i "$SSH_KEY" teran8777@34.21.192.28 \
            'export SECRET_KEY="'"${SECRET_KEY}"'"
             export DATABASE_URL="'"${DATABASE_URL}"'"
             export WAREHOUSE_DATABASE_URL="'"${WAREHOUSE_DATABASE_URL}"'"
             export GROQ_API_KEY="'"${GROQ_API_KEY}"'"
             export SMTP_HOST="'"${SMTP_HOST}"'"
             export SMTP_PORT="'"${SMTP_PORT}"'"
             export SMTP_USER="'"${SMTP_USER}"'"
             export SMTP_PASSWORD="'"${SMTP_PASSWORD}"'"
             bash /home/teran8777/deploy.sh'

      - name: Health check
        run: |
          sleep 30
          curl -sf http://34.21.192.28/api/health && echo "Backend OK"
          curl -sf http://34.21.192.28/ && echo "Frontend OK"
