name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add VM host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.21.192.28 >> ~/.ssh/known_hosts

      - name: Copy private key for SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy deploy script to VM
        env:
          SSH_KEY: /tmp/deploy_key
        run: |
          scp -i "$SSH_KEY" deploy.sh teran8777@34.21.192.28:/home/teran8777/deploy.sh

      - name: Copy env vars file to VM
        env:
          SSH_KEY: /tmp/deploy_key
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WAREHOUSE_DATABASE_URL: ${{ secrets.WAREHOUSE_DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          cat > /tmp/env_vars.sh << 'ENVEOF'
          export SECRET_KEY="__SECRET_KEY__"
          export DATABASE_URL="__DB_URL__"
          export WAREHOUSE_DATABASE_URL="__WH_DB_URL__"
          export GROQ_API_KEY="__GROQ_KEY__"
          export SMTP_HOST="__SMTP_HOST__"
          export SMTP_PORT="__SMTP_PORT__"
          export SMTP_USER="__SMTP_USER__"
          export SMTP_PASSWORD="__SMTP_PASS__"
          ENVEOF
          sed -i "s|__SECRET_KEY__|${SECRET_KEY}|g" /tmp/env_vars.sh
          sed -i "s|__DB_URL__|${DATABASE_URL}|g" /tmp/env_vars.sh
          sed -i "s|__WH_DB_URL__|${WAREHOUSE_DATABASE_URL}|g" /tmp/env_vars.sh
          sed -i "s|__GROQ_KEY__|${GROQ_API_KEY}|g" /tmp/env_vars.sh
          sed -i "s|__SMTP_HOST__|${SMTP_HOST}|g" /tmp/env_vars.sh
          sed -i "s|__SMTP_PORT__|${SMTP_PORT}|g" /tmp/env_vars.sh
          sed -i "s|__SMTP_USER__|${SMTP_USER}|g" /tmp/env_vars.sh
          sed -i "s|__SMTP_PASS__|${SMTP_PASSWORD}|g" /tmp/env_vars.sh
          scp -i "$SSH_KEY" /tmp/env_vars.sh teran8777@34.21.192.28:/home/teran8777/env_vars.sh

      - name: Run deploy on VM
        env:
          SSH_KEY: /tmp/deploy_key
        run: |
          ssh -i "$SSH_KEY" teran8777@34.21.192.28 \
            'bash -c "source /home/teran8777/env_vars.sh && bash /home/teran8777/deploy.sh"'

      - name: Health check
        run: |
          sleep 30
          echo "Checking backend health..."
          curl -sf http://34.21.192.28/api/health || { echo "FAIL: Backend /api/health unreachable"; exit 1; }
          echo "Backend OK"
          echo "Checking frontend..."
          curl -sf http://34.21.192.28/ > /dev/null || { echo "FAIL: Frontend unreachable"; exit 1; }
          echo "Frontend OK"
