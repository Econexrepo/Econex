name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add VM host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.21.192.28 >> ~/.ssh/known_hosts

      - name: Copy private key for SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy files to VM
        env:
          SSH_KEY: /tmp/deploy_key
        run: |
          scp -i "$SSH_KEY" \
            docker-compose.yml nginx.conf \
            backend/Dockerfile frontend/Dockerfile \
            deploy.sh \
            ubuntu@34.21.192.28:/home/ubuntu/econex/

      - name: Write .env to VM via SSH
        env:
          SSH_KEY: /tmp/deploy_key
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WAREHOUSE_DATABASE_URL: ${{ secrets.WAREHOUSE_DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          ssh -i "$SSH_KEY" ubuntu@34.21.192.28 \
            'cat > /home/ubuntu/econex/.env << EOF
            SECRET_KEY='"${SECRET_KEY}"'
            ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=60
            FRONTEND_ORIGIN=http://34.21.192.28
            DATABASE_URL='"${DATABASE_URL}"'
            WAREHOUSE_DATABASE_URL='"${WAREHOUSE_DATABASE_URL}"'
            GROQ_API_KEY='"${GROQ_API_KEY}"'
            SMTP_HOST='"${SMTP_HOST}"'
            SMTP_PORT='"${SMTP_PORT}"'
            SMTP_USER='"${SMTP_USER}"'
            SMTP_PASSWORD='"${SMTP_PASSWORD}"'
            HF_TOKEN=
            EOF'

      - name: Run deploy script on VM
        env:
          SSH_KEY: /tmp/deploy_key
        run: |
          ssh -i "$SSH_KEY" ubuntu@34.21.192.28 \
            'cd /home/ubuntu/econex && bash deploy.sh'

      - name: Health check
        run: |
          sleep 30
          curl -sf http://34.21.192.28/api/health && echo "Backend OK"
          curl -sf http://34.21.192.28/ && echo "Frontend OK"
